name: PR Preview

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, closed]

jobs:
  build-and-lint:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      working-directory: ./

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm i --frozen-lockfile
        working-directory: ${{ env.working-directory }}

      # - name: Lint
      #   run: pnpm --filter @allcll/client lint && pnpm --filter @allcll/admin lint
      #   working-directory: ${{ env.working-directory }}

      - name: Build Client
        run: pnpm run build-client
        working-directory: ${{ env.working-directory }}

      - name: Build Admin
        run: pnpm run build-admin
        working-directory: ${{ env.working-directory }}

  deploy-preview:
    if: github.event.action != 'closed'
    needs: build-and-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      project-directory: ./packages/client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Build Client for Preview
        run: pnpm -F @allcll/client run build -- --base=/pr-${{ github.event.pull_request.number }}/
        env:
          VITE_SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.DEV_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_TABLE_NAME: ${{ secrets.DEV_SUPABASE_TABLE_NAME }}
          VITE_API_BASE_URL: ${{ secrets.DEV_API_BASE_URL }}
          VITE_DEV_SERVER: true

      - name: Deploy preview to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          port: 22
          source: packages/client/dist/*
          target: ${{ secrets.PWD }}/pr-${{ github.event.pull_request.number }}
          strip_components: 3

      - name: Reload Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          port: 22
          script: sudo systemctl reload nginx

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_BASE_URL: ${{ secrets.DEV_PREVIEW_BASE_URL }}
        with:
          script: |
            const pr_number = context.payload.pull_request.number;
            const base_url = process.env.PREVIEW_BASE_URL || 'http://dev.allcll.kr';
            const preview_url = `${base_url}/pr-${pr_number}/`;
            const body = `## 🚀 Preview Deployment\n\nPreview URL: ${preview_url}\n\n> This preview is automatically updated on each push.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
            });
            const existing = comments.find(c => c.body.includes('## 🚀 Preview Deployment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr_number,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions: {} # No permissions needed

    steps:
      - name: Remove preview directory and reload Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          port: 22
          script: |
            PR_NUMBER="${{ github.event.pull_request.number }}"
            if [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
              rm -rf "${{ secrets.PWD }}/pr-${PR_NUMBER}"
              sudo systemctl reload nginx
            fi
